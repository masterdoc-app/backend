name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_HOST: 80.87.196.33
  DEPLOY_PATH: /opt/masterdoc-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle test
        run: ./gradlew test --no-daemon

  deploy:
    name: Deploy to Onyx VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build fat jar
        run: ./gradlew jar --no-daemon && cp build/libs/masterdoc-backend-0.1.0.jar masterdoc-backend.jar

      - name: Verify deploy secrets
        env:
          KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          USER_NAME: ${{ secrets.DEPLOY_USER }}
          PAT: ${{ secrets.ONYX_PAT }}
        run: |
          test -n "$KEY" || { echo "Add DEPLOY_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$USER_NAME" || { echo "Add DEPLOY_USER"; exit 1; }
          test -n "$PAT" || { echo "Add ONYX_PAT"; exit 1; }

      - name: Load SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_ed25519
          chmod 600 ~/.ssh/deploy_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Rsync jar and env
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          ONYX_PAT: ${{ secrets.ONYX_PAT }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${DEPLOY_PATH}"
          rsync -avz -e "ssh -i $HOME/.ssh/deploy_ed25519 -o IdentitiesOnly=yes" \
            masterdoc-backend.jar \
            deploy/masterdoc-backend.service \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "printf '%s\n' 'ONYX_BASE_URL=http://127.0.0.1:3000/api' 'ONYX_PAT=${ONYX_PAT}' 'PORT=8081' > /etc/masterdoc/backend.env && chmod 600 /etc/masterdoc/backend.env"

      - name: Install systemd unit and restart
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cp ${DEPLOY_PATH}/masterdoc-backend.service /etc/systemd/system/ && systemctl daemon-reload && systemctl enable masterdoc-backend && systemctl restart masterdoc-backend"

      - name: Smoke health (loopback on VPS)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sleep 3 && curl -fsS http://127.0.0.1:8081/health"
