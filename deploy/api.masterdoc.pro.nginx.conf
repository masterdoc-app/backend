# api.masterdoc.pro — HTTPS reverse proxy to masterdoc-backend :8081
# Certs: certbot certonly --webroot -w /var/www/certbot -d api.masterdoc.pro

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.masterdoc.pro;

    ssl_certificate /etc/letsencrypt/live/api.masterdoc.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.masterdoc.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.masterdoc.pro;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
